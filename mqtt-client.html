<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wavendis — MQTT Client</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&family=Syne:wght@400;700;800&display=swap');

    :root {
      --bg:      #0d0d0d;
      --surface: #141414;
      --border:  #2a2a2a;
      --accent:  #c8f135;
      --red:     #ff4444;
      --muted:   #555;
      --text:    #e8e8e8;
      --subtext: #888;
      --mono:    'JetBrains Mono', monospace;
      --sans:    'Syne', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .logo {
      font-family: var(--sans);
      font-weight: 800;
      font-size: 16px;
      letter-spacing: -0.02em;
      color: var(--accent);
    }
    .logo span { color: var(--subtext); font-weight: 400; }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--subtext);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    .dot.connected { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
    .dot.error     { background: var(--red);    box-shadow: 0 0 6px var(--red); }

    .main {
      display: grid;
      grid-template-columns: 320px 1fr;
      flex: 1;
      overflow: hidden;
      height: calc(100vh - 49px);
    }

    .panel-left {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .section {
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
    }

    .section-title {
      font-family: var(--sans);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--subtext);
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 10px;
      color: var(--subtext);
      letter-spacing: 0.06em;
      margin-bottom: 5px;
      margin-top: 10px;
    }
    label:first-of-type { margin-top: 0; }

    input[type=text], input[type=number], input[type=password], select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      padding: 8px 10px;
      border-radius: 4px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: var(--accent); }

    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    button {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.06em;
      cursor: pointer;
      border: none;
      border-radius: 4px;
      padding: 9px 14px;
      transition: opacity 0.15s, background 0.15s;
    }
    button:hover  { opacity: 0.85; }
    button:active { opacity: 0.7; }

    .btn-accent {
      background: var(--accent);
      color: #0d0d0d;
      font-weight: 600;
      width: 100%;
      margin-top: 14px;
    }
    .btn-danger {
      background: #1e0a0a;
      color: var(--red);
      border: 1px solid #3a1010;
      width: 100%;
      margin-top: 8px;
    }
    .btn-sm {
      background: var(--border);
      color: var(--text);
      padding: 6px 10px;
      font-size: 10px;
    }
    .btn-unsub {
      background: transparent;
      color: var(--red);
      border: 1px solid #3a1010;
      padding: 3px 8px;
      font-size: 10px;
    }

    /* Subscribe list */
    .sub-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 10px;
    }
    .sub-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 11px;
    }
    .sub-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .sub-topic {
      flex: 1;
      color: var(--text);
      word-break: break-all;
    }
    .color-picker {
      width: 22px; height: 22px;
      border: 1px solid var(--border);
      border-radius: 3px;
      cursor: pointer;
      padding: 1px;
      background: transparent;
      flex-shrink: 0;
    }

    /* Publish */
    .publish-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: end; }

    textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      padding: 8px 10px;
      border-radius: 4px;
      outline: none;
      resize: vertical;
      min-height: 70px;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: var(--accent); }

    .qos-retain { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    /* Right panel */
    .panel-right {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .log-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
    .tab {
      background: transparent;
      color: var(--subtext);
      border: 1px solid transparent;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .tab.active {
      background: var(--border);
      color: var(--text);
      border-color: var(--border);
    }
    .tab.merged { color: #ab47bc; }
    .tab.merged.active { background: #1a0a1e; border-color: #3a1a4a; color: #ce93d8; }

    .log-area {
      flex: 1;
      overflow-y: auto;
      padding: 14px 20px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .log-entry {
      display: grid;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 4px;
      border-left: 2px solid transparent;
      font-size: 11px;
      line-height: 1.5;
      animation: fadeIn 0.2s ease;
    }
    .log-entry.has-dir {
      grid-template-columns: 72px 16px 1fr 2fr;
    }
    .log-entry.no-dir {
      grid-template-columns: 72px 1fr 2fr;
    }

    @keyframes fadeIn { from { opacity:0; transform:translateY(3px); } to { opacity:1; transform:translateY(0); } }

    .log-entry.incoming { background: #0a1a0a; border-left-color: #4caf50; }
    .log-entry.outgoing { background: #0a1020; border-left-color: #42a5f5; }
    .log-entry.system   { background: #141414; border-left-color: var(--muted); }
    .log-entry.error-e  { background: #1a0a0a; border-left-color: var(--red); }

    .log-time  { color: var(--muted); font-size: 10px; white-space: nowrap; align-self: start; padding-top: 1px; }
    .log-dir   { font-size: 13px; text-align: center; align-self: start; }
    .log-topic { word-break: break-all; }
    .log-msg   { color: var(--text); word-break: break-all; white-space: pre-wrap; }

    .log-entry.system  .log-topic { color: var(--subtext); }
    .log-entry.error-e .log-topic { color: var(--red); }

    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="logo">Wavendis<span> — mqtt client</span></div>
  <div class="status-badge">
    <div class="dot" id="dot"></div>
    <span id="statusText">DISCONNECTED</span>
  </div>
</div>

<div class="main">

  <!-- Left panel -->
  <div class="panel-left">

    <div class="section">
      <div class="section-title">Connection</div>
      <label>Host</label>
      <input type="text" id="host" value="broker.hivemq.com"/>
      <div class="row2">
        <div>
          <label>Port</label>
          <input type="number" id="port" value="8884"/>
        </div>
        <div>
          <label>Client ID</label>
          <input type="text" id="clientId"/>
        </div>
      </div>
      <div class="row2">
        <div>
          <label>Username</label>
          <input type="text" id="username" placeholder="optional"/>
        </div>
        <div>
          <label>Password</label>
          <input type="password" id="password" placeholder="optional"/>
        </div>
      </div>
      <button class="btn-accent" id="connectBtn" onclick="toggleConnect()">Connect</button>
      <button class="btn-danger" id="disconnectBtn" onclick="toggleConnect()" style="display:none">Disconnect</button>
    </div>

    <div class="section">
      <div class="section-title">Subscribe</div>
      <div class="publish-row">
        <div>
          <label>Topic</label>
          <input type="text" id="subTopic" placeholder="sensors/# or sensors/temp"
            onkeydown="if(event.key==='Enter') subscribe()"/>
        </div>
        <button class="btn-sm" onclick="subscribe()" style="margin-bottom:1px">SUB</button>
      </div>
      <div class="sub-list" id="subList"></div>
    </div>

    <div class="section">
      <div class="section-title">Publish</div>
      <label>Topic</label>
      <input type="text" id="pubTopic" placeholder="sensors/temp"/>
      <label>Message</label>
      <textarea id="pubMsg" placeholder="Hello from browser..."
        onkeydown="if(event.ctrlKey&&event.key==='Enter') publish()"></textarea>
      <div class="qos-retain" style="margin-top:8px">
        <div>
          <label>QoS</label>
          <select id="qos">
            <option value="0">0 — At most once</option>
            <option value="1" selected>1 — At least once</option>
            <option value="2">2 — Exactly once</option>
          </select>
        </div>
        <div>
          <label>Retain</label>
          <select id="retain">
            <option value="false">No</option>
            <option value="true">Yes</option>
          </select>
        </div>
      </div>
      <button class="btn-accent" onclick="publish()" style="margin-top:10px">Publish &nbsp;↑&nbsp; Ctrl+Enter</button>
    </div>

  </div>

  <!-- Right panel -->
  <div class="panel-right">
    <div class="log-header">
      <div class="log-tabs">
        <button class="tab active" id="tab-all"    onclick="setTab('all')">All</button>
        <button class="tab"        id="tab-in"     onclick="setTab('in')">Incoming</button>
        <button class="tab"        id="tab-out"    onclick="setTab('out')">Outgoing</button>
        <button class="tab merged" id="tab-merged" onclick="setTab('merged')">⇅ Merged</button>
        <button class="tab"        id="tab-sys"    onclick="setTab('sys')">System</button>
      </div>
      <button class="btn-sm" onclick="clearLog()">Clear</button>
    </div>
    <div class="log-area" id="logArea">
      <div class="empty-state" id="emptyState">Waiting for messages…</div>
    </div>
  </div>

</div>

<script>
  // ── State ────────────────────────────────────────────
  let client        = null;
  let connected     = false;
  let subscriptions = []; // [{ topic, color }]
  let logEntries    = [];
  let currentTab    = 'all';

  const COLORS = [
    '#c8f135','#42a5f5','#ef5350','#ab47bc',
    '#26c6da','#ff7043','#66bb6a','#ffa726'
  ];
  let colorIndex = 0;

  document.getElementById('clientId').value =
    'web_' + Math.random().toString(36).substr(2, 8);

  // ── Connect ──────────────────────────────────────────
  function toggleConnect() { if (!connected) connect(); else disconnect(); }

  function connect() {
    const host     = document.getElementById('host').value.trim();
    const port     = parseInt(document.getElementById('port').value);
    const clientId = document.getElementById('clientId').value.trim();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    try { client = new Paho.MQTT.Client(host, port, clientId); }
    catch (e) { addLog('system','ERROR','Failed to create client: '+e.message,'error-e'); return; }

    client.onConnectionLost = onConnectionLost;
    client.onMessageArrived = onMessageArrived;

    const opts = {
      useSSL: port === 8884 || port === 443,
      timeout: 10, keepAliveInterval: 30, cleanSession: true,
      onSuccess: onConnect, onFailure: onFailure
    };
    if (username) opts.userName = username;
    if (password) opts.password = password;

    addLog('system','CONNECTING', host+':'+port, 'system');
    client.connect(opts);
  }

  function disconnect() { if (client && connected) client.disconnect(); }

  function onConnect() {
    connected = true;
    setStatus(true);
    addLog('system','CONNECTED',
      document.getElementById('host').value+':'+document.getElementById('port').value,'system');
    subscriptions.forEach(s => client.subscribe(s.topic, { qos: 1 }));
  }

  function onFailure(resp) {
    connected = false; setStatus(false, true);
    addLog('system','FAILED', resp.errorMessage||'Connection failed','error-e');
  }

  function onConnectionLost(resp) {
    connected = false; setStatus(false);
    if (resp.errorCode !== 0) addLog('system','LOST', resp.errorMessage,'error-e');
    else addLog('system','DISCONNECTED','Connection closed','system');
    document.getElementById('connectBtn').style.display    = '';
    document.getElementById('disconnectBtn').style.display = 'none';
  }

  // ── Subscribe ────────────────────────────────────────
  function subscribe() {
    const topic = document.getElementById('subTopic').value.trim();
    if (!topic)     { addLog('system','ERROR','Topic is empty','error-e'); return; }
    if (!connected) { addLog('system','ERROR','Not connected','error-e'); return; }
    if (subscriptions.find(s => s.topic === topic)) return;

    const color = COLORS[colorIndex % COLORS.length];
    colorIndex++;

    client.subscribe(topic, {
      qos: 1,
      onSuccess: () => {
        subscriptions.push({ topic, color });
        renderSubList();
        addLog('system','SUBSCRIBED', topic,'system');
        document.getElementById('subTopic').value = '';
      },
      onFailure: (e) => {
        colorIndex--;
        addLog('system','SUB FAILED', e.errorMessage||topic,'error-e');
      }
    });
  }

  function unsubscribe(topic) {
    if (!connected) return;
    client.unsubscribe(topic, {
      onSuccess: () => {
        subscriptions = subscriptions.filter(s => s.topic !== topic);
        renderSubList(); renderLog();
        addLog('system','UNSUBSCRIBED', topic,'system');
      }
    });
  }

  function setSubColor(topic, color) {
    const sub = subscriptions.find(s => s.topic === topic);
    if (sub) { sub.color = color; renderSubList(); renderLog(); }
  }

  function getTopicColor(topic) {
    const exact = subscriptions.find(s => s.topic === topic);
    if (exact) return exact.color;
    for (const s of subscriptions) {
      if (topicMatchesFilter(topic, s.topic)) return s.color;
    }
    return null;
  }

  function topicMatchesFilter(topic, filter) {
    if (filter === '#') return true;
    const tp = topic.split('/'), fp = filter.split('/');
    for (let i = 0; i < fp.length; i++) {
      if (fp[i] === '#') return true;
      if (fp[i] === '+') continue;
      if (fp[i] !== tp[i]) return false;
    }
    return tp.length === fp.length;
  }

  function renderSubList() {
    const list = document.getElementById('subList');
    list.innerHTML = '';
    subscriptions.forEach(s => {
      const item = document.createElement('div');
      item.className = 'sub-item';
      item.innerHTML = `
        <span class="sub-dot" style="background:${s.color}"></span>
        <span class="sub-topic">${s.topic}</span>
        <input type="color" class="color-picker" value="${s.color}"
          onchange="setSubColor('${s.topic}', this.value)" title="Change color"/>
        <button class="btn-unsub" onclick="unsubscribe('${s.topic}')">UNSUB</button>
      `;
      list.appendChild(item);
    });
  }

  // ── Publish ──────────────────────────────────────────
  function publish() {
    const topic   = document.getElementById('pubTopic').value.trim();
    const payload = document.getElementById('pubMsg').value;
    const qos     = parseInt(document.getElementById('qos').value);
    const retain  = document.getElementById('retain').value === 'true';

    if (!topic)     { addLog('system','ERROR','Topic is empty','error-e'); return; }
    if (!connected) { addLog('system','ERROR','Not connected','error-e'); return; }

    const msg = new Paho.MQTT.Message(payload);
    msg.destinationName = topic;
    msg.qos      = qos;
    msg.retained = retain;

    client.send(msg);
    addLog('outgoing', topic, payload||'(empty)', 'outgoing');
  }

  function onMessageArrived(msg) {
    addLog('incoming', msg.destinationName, msg.payloadString, 'incoming');
  }

  // ── Log ──────────────────────────────────────────────
  function addLog(type, topic, message, cssClass) {
    const time = new Date().toTimeString().substr(0, 8);
    logEntries.push({ type, topic, message, cssClass, time });
    renderLog();
  }

  function renderLog() {
    const area  = document.getElementById('logArea');
    const empty = document.getElementById('emptyState');
    const isMerged = currentTab === 'merged';

    const filtered = logEntries.filter(e => {
      if (currentTab === 'all')    return true;
      if (currentTab === 'in')     return e.type === 'incoming';
      if (currentTab === 'out')    return e.type === 'outgoing';
      if (currentTab === 'merged') return e.type === 'incoming' || e.type === 'outgoing';
      if (currentTab === 'sys')    return e.type === 'system';
      return true;
    });

    area.querySelectorAll('.log-entry').forEach(el => el.remove());

    if (filtered.length === 0) { empty.style.display = 'flex'; return; }
    empty.style.display = 'none';

    filtered.forEach(e => {
      const div   = document.createElement('div');
      const color = (e.type === 'incoming' || e.type === 'outgoing') ? getTopicColor(e.topic) : null;
      const isMsg = e.type === 'incoming' || e.type === 'outgoing';

      div.className = 'log-entry ' + e.cssClass + (isMerged ? ' has-dir' : ' no-dir');
      if (color) div.style.borderLeftColor = color;

      const dirHtml = isMerged
        ? `<span class="log-dir" style="color:${color||'#888'}">${e.type==='incoming'?'↓':'↑'}</span>`
        : '';

      const topicColor = isMsg && color ? `style="color:${color}"` : '';
      const topicClass = isMsg && !color
        ? (e.type==='incoming' ? 'style="color:#4caf50"' : 'style="color:#42a5f5"')
        : topicColor;

      div.innerHTML = `
        <span class="log-time">${e.time}</span>
        ${dirHtml}
        <span class="log-topic" ${topicClass}>${escHtml(e.topic)}</span>
        <span class="log-msg">${escHtml(e.message)}</span>
      `;
      area.appendChild(div);
    });

    area.scrollTop = area.scrollHeight;
  }

  function clearLog() { logEntries = []; renderLog(); }

  function setTab(tab) {
    currentTab = tab;
    ['all','in','out','merged','sys'].forEach(t => {
      document.getElementById('tab-'+t).classList.toggle('active', t === tab);
    });
    renderLog();
  }

  // ── Status ───────────────────────────────────────────
  function setStatus(isConnected, isError) {
    const dot = document.getElementById('dot');
    const text = document.getElementById('statusText');
    dot.className    = 'dot'+(isConnected?' connected':isError?' error':'');
    text.textContent = isConnected ? 'CONNECTED' : isError ? 'ERROR' : 'DISCONNECTED';
    document.getElementById('connectBtn').style.display    = isConnected ? 'none' : '';
    document.getElementById('disconnectBtn').style.display = isConnected ? '' : 'none';
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
